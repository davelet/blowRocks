<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>blowRocks 💥</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 1px solid #222;
  cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  blowRocks — HTML5 Canvas Edition
//  WASD移动 | 鼠标瞄准 | 左键射击
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// --- Game State ---
let score = 0;
let lives = 3;
let gameOver = false;
let shakeTimer = 0;
let particles = [];
let bullets = [];
let asteroids = [];
let keys = {};
let mouse = { x: 400, y: 300 };
let mouseDown = false;
let lastFireTime = 0;
const FIRE_RATE = 200; // ms
let gameTime = 0;
let spawnTimer = 0;
let spawnInterval = 120; // frames
let frameCount = 0;

// --- Player ---
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  angle: 0,
  speed: 4,
  radius: 12,
  invincible: 0,
  alive: true
};

// --- Stars background ---
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 0.5,
    brightness: Math.random() * 0.5 + 0.3
  });
}

// --- Input ---
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('click', () => { if (gameOver) restartGame(); });

// --- Helpers ---
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function wrap(obj) {
  if (obj.x < -20) obj.x = canvas.width + 20;
  if (obj.x > canvas.width + 20) obj.x = -20;
  if (obj.y < -20) obj.y = canvas.height + 20;
  if (obj.y > canvas.height + 20) obj.y = -20;
}

function spawnParticles(x, y, count, color, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.03 + 0.01,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

// --- Asteroid shapes ---
function drawRock(x, y, radius, sides, irregularity) {
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const angle = (i / sides) * Math.PI * 2;
    const r = radius * (1 + (Math.random() - 0.5) * irregularity * 2);
    // Use seeded offset for consistent shape
    const seed = (x * 7 + y * 13 + i * 37) % 100 / 100;
    const rr = radius * (1 + (seed - 0.5) * irregularity * 2);
    const px = x + Math.cos(angle) * rr;
    const py = y + Math.sin(angle) * rr;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// --- Asteroid class ---
function createAsteroid(x, y, size) {
  const sizes = {
    large:  { radius: 40, score: 10, color: '#888', speed: 1 },
    medium: { radius: 25, score: 25, color: '#aaa', speed: 2 },
    small:  { radius: 12, score: 50, color: '#ccc', speed: 3 }
  };
  const s = sizes[size];
  const angle = Math.random() * Math.PI * 2;
  const spd = s.speed * (0.5 + Math.random());
  return {
    x, y,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd,
    radius: s.radius,
    score: s.score,
    color: s.color,
    size,
    rot: 0,
    rotSpeed: (Math.random() - 0.5) * 0.03,
    sides: Math.floor(Math.random() * 3) + 6,
    irregularity: Math.random() * 0.3 + 0.1
  };
}

function spawnAsteroid() {
  // Spawn from edges
  let x, y;
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { x = -30; y = Math.random() * canvas.height; }
  else if (edge === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
  else if (edge === 2) { x = Math.random() * canvas.width; y = -30; }
  else { x = Math.random() * canvas.width; y = canvas.height + 30; }

  // Prefer large rocks
  const r = Math.random();
  const size = r < 0.5 ? 'large' : r < 0.8 ? 'medium' : 'small';
  asteroids.push(createAsteroid(x, y, size));
}

function splitAsteroid(rock) {
  spawnParticles(rock.x, rock.y, 12, rock.color, 3);
  if (rock.size === 'large') {
    asteroids.push(createAsteroid(rock.x, rock.y, 'medium'));
    asteroids.push(createAsteroid(rock.x, rock.y, 'medium'));
  } else if (rock.size === 'medium') {
    asteroids.push(createAsteroid(rock.x, rock.y, 'small'));
    asteroids.push(createAsteroid(rock.x, rock.y, 'small'));
  }
  // small → nothing, just destroyed
}

// --- Shooting ---
function fireBullet() {
  const now = Date.now();
  if (now - lastFireTime < FIRE_RATE) return;
  lastFireTime = now;

  const angle = player.angle;
  bullets.push({
    x: player.x + Math.cos(angle) * 18,
    y: player.y + Math.sin(angle) * 18,
    vx: Math.cos(angle) * 8,
    vy: Math.sin(angle) * 8,
    life: 60
  });

  // Muzzle flash
  spawnParticles(
    player.x + Math.cos(angle) * 18,
    player.y + Math.sin(angle) * 18,
    3, '#ff0', 2
  );
}

// --- Draw ship ---
function drawShip(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);

  // Ship body
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-12, 12);
  ctx.lineTo(-5, 8);
  ctx.lineTo(0, 10);
  ctx.lineTo(5, 8);
  ctx.lineTo(12, 12);
  ctx.closePath();
  ctx.fillStyle = player.invincible > 0 ? '#4af' : '#0cf';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Engine glow
  if (keys['w'] || keys['arrowup']) {
    ctx.beginPath();
    ctx.moveTo(-4, 12);
    ctx.lineTo(0, 12 + Math.random() * 10 + 5);
    ctx.lineTo(4, 12);
    ctx.fillStyle = '#f80';
    ctx.fill();
  }

  ctx.restore();
}

// --- HUD ---
function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 20, 35);

  // Lives
  ctx.textAlign = 'right';
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '♥ ';
  ctx.fillStyle = '#f44';
  ctx.fillText(hearts, canvas.width - 20, 35);

  // Wave info
  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '14px Courier New';
  ctx.fillText(`WAVE ${Math.floor(gameTime / 1800) + 1}`, canvas.width / 2, 35);
}

// --- Update ---
function update() {
  if (gameOver) return;
  frameCount++;
  gameTime++;

  // Player movement
  if (player.alive) {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    const len = Math.hypot(dx, dy);
    if (len > 0) {
      player.x += (dx / len) * player.speed;
      player.y += (dy / len) * player.speed;
    }

    // Clamp to screen
    player.x = Math.max(15, Math.min(canvas.width - 15, player.x));
    player.y = Math.max(15, Math.min(canvas.height - 15, player.y));

    // Aim at mouse
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    // Shoot
    if (mouseDown) fireBullet();

    // Invincibility timer
    if (player.invincible > 0) player.invincible--;
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < -10 || b.x > canvas.width + 10 || b.y < -10 || b.y > canvas.height + 10) {
      bullets.splice(i, 1);
    }
  }

  // Asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx;
    a.y += a.vy;
    a.rot += a.rotSpeed;
    wrap(a);

    // Check bullet hits
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (dist(a, bullets[j]) < a.radius) {
        score += a.score;
        splitAsteroid(a);
        asteroids.splice(i, 1);
        bullets.splice(j, 1);
        shakeTimer = 6;
        break;
      }
    }

    // Check player collision
    if (player.alive && player.invincible <= 0 && dist(a, player) < a.radius + player.radius) {
      lives--;
      shakeTimer = 12;
      spawnParticles(player.x, player.y, 20, '#f44', 4);
      splitAsteroid(a);
      asteroids.splice(i, 1);

      if (lives <= 0) {
        gameOver = true;
        player.alive = false;
        spawnParticles(player.x, player.y, 50, '#f80', 5);
      } else {
        player.invincible = 90; // 1.5 sec
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Spawn asteroids with increasing difficulty
  spawnTimer++;
  // Decrease interval over time (min 40 frames)
  const difficultyInterval = Math.max(40, spawnInterval - Math.floor(gameTime / 60));
  if (spawnTimer >= difficultyInterval) {
    spawnTimer = 0;
    spawnAsteroid();
    // Extra asteroid every ~30 seconds
    if (gameTime > 0 && gameTime % 1800 === 0) {
      spawnAsteroid();
      spawnAsteroid();
    }
  }
}

// --- Draw ---
function draw() {
  // Screen shake
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeTimer,
      (Math.random() - 0.5) * shakeTimer
    );
    shakeTimer--;
  }

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // Asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);

    drawRock(0, 0, a.radius, a.sides, a.irregularity);
    ctx.fillStyle = a.color;
    ctx.fill();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Crater detail
    ctx.beginPath();
    ctx.arc(a.radius * 0.2, -a.radius * 0.1, a.radius * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fill();

    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ff0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,0,0.2)';
    ctx.fill();
  }

  // Player
  if (player.alive) {
    // Blink when invincible
    if (player.invincible <= 0 || Math.floor(player.invincible / 4) % 2 === 0) {
      drawShip(player.x, player.y, player.angle);
    }
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#f44';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

    ctx.fillStyle = '#fff';
    ctx.font = '24px Courier New';
    ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

    ctx.fillStyle = '#888';
    ctx.font = '16px Courier New';
    ctx.fillText('Click to restart', canvas.width / 2, canvas.height / 2 + 60);
  }

  ctx.restore();
}

// --- Restart ---
function restartGame() {
  score = 0;
  lives = 3;
  gameOver = false;
  gameTime = 0;
  spawnTimer = 0;
  bullets = [];
  asteroids = [];
  particles = [];
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.alive = true;
  player.invincible = 60;
}

// --- Game Loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start
gameLoop();
</script>
</body>
</html>
